name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Web — lint + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test:coverage

  android:
    name: Android — unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run unit tests
        working-directory: android
        run: ./gradlew test --no-daemon

  android-e2e:
    name: Android — E2E (background survival + driving events)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
      - name: Install example-app dependencies
        working-directory: example-app
        run: npm ci
      - name: Copy web assets into Android project
        working-directory: example-app
        run: npx cap copy android
      - name: Build example APK
        working-directory: example-app/android
        run: ./gradlew assembleDebug --no-daemon
      - name: E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          script: >-
            .github/scripts/e2e-background-survival.sh &&
            .github/scripts/e2e-driving-events.sh
      - name: Upload logcat on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logcat
          path: |
            /tmp/e2e-logcat.txt
            /tmp/e2e-driving-logcat.txt

  ios:
    name: iOS — build + unit tests
    runs-on: macos-15
    timeout-minutes: 40
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available --json \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for runtime, devices in d['devices'].items():
              for dev in devices:
                  if 'iPhone' in dev['name'] and dev['isAvailable']:
                      print(dev['udid'])
                      exit()
          ")
          xcodebuild test \
            -scheme GachlabCapacitorBackgroundGeolocation \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            | xcpretty || xcodebuild test \
              -scheme GachlabCapacitorBackgroundGeolocation \
              -destination "platform=iOS Simulator,id=$SIMULATOR_ID"
