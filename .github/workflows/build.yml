name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — lint + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm run test:coverage

  android:
    name: Android — unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Run unit tests
        working-directory: android
        run: ./gradlew test --no-daemon

  ios:
    name: iOS — build + unit tests
    runs-on: macos-15
    timeout-minutes: 40
    needs: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run tests
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available --json \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for runtime, devices in d['devices'].items():
              for dev in devices:
                  if 'iPhone' in dev['name'] and dev['isAvailable']:
                      print(dev['udid'])
                      exit()
          ")
          xcodebuild test \
            -scheme GachlabCapacitorBackgroundGeolocation \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            | xcpretty || xcodebuild test \
              -scheme GachlabCapacitorBackgroundGeolocation \
              -destination "platform=iOS Simulator,id=$SIMULATOR_ID"
