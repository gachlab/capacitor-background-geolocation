name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    name: Web — typecheck + build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Type-aware ESLint is paused: TypeScript 7 (native) drops the JS compiler API
      # that @typescript-eslint needs. `typecheck` (native tsc --noEmit) is the type
      # gate; `lint` is Prettier formatting only. Restore eslint once it supports TS 7.
      - run: npm run typecheck
      - run: npm run build
      - run: npm run lint
      - run: npm run test:coverage
      # Real-browser E2E for the web implementation (geofencing) — parity with the
      # native simulator/emulator geofencing E2E. Uses Chromium + mocked geolocation.
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e:web

  android:
    name: Android — unit tests + E2E
    runs-on: [self-hosted, mac-mini]
    timeout-minutes: 20
    needs: web
    env:
      JAVA_HOME: /Users/gcarrillo/.local/share/mise/installs/java/zulu-21.46.19.0
      ANDROID_HOME: /Users/gcarrillo/Library/Android/sdk
      ANDROID_SDK_ROOT: /Users/gcarrillo/Library/Android/sdk
    steps:
      - name: Setup PATH
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests
        working-directory: android
        run: ./gradlew test --no-daemon
      - run: npm run build
      - name: Install example-app dependencies
        working-directory: example-app
        run: npm ci
      - name: Sync web assets and plugin into Android project
        working-directory: example-app
        run: npx cap sync android
      - name: Build example APK
        working-directory: example-app/android
        run: ./gradlew assembleDebug --no-daemon
      - name: E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: arm64-v8a
          # Google APIs image (Play Services) so GMS geofencing works — the movement
          # engine now defaults to the native stationary-exit geofence. The self-hosted
          # `android-e2e` AVD is provisioned from this same google_apis image.
          target: google_apis
          profile: Nexus 6
          avd-name: android-e2e
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim
          enable-hw-acceleration: true
          script: >-
            .github/scripts/e2e-background-survival.sh &&
            .github/scripts/e2e-driving-events.sh
      - name: E2E geofencing (GMS)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis_playstore
          arch: arm64-v8a
          avd-name: pickup-e2e
          force-avd-creation: false
          emulator-options: -no-window -no-audio -no-boot-anim
          enable-hw-acceleration: true
          script: .github/scripts/e2e-android-geofencing.sh
      - name: Upload logcat on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-e2e-logcat
          path: |
            /tmp/e2e-logcat.txt
            /tmp/e2e-driving-logcat.txt
            /tmp/e2e-android-geofencing-logcat.txt

  ios:
    name: iOS — unit tests + E2E
    runs-on: macos-15
    timeout-minutes: 60
    needs: web
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit tests
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available --json \
            | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for runtime, devices in d['devices'].items():
              for dev in devices:
                  if 'iPhone' in dev['name'] and dev['isAvailable']:
                      print(dev['udid'])
                      exit()
          ")
          xcodebuild test \
            -scheme GachlabCapacitorBackgroundGeolocation \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID"
      - run: npm run build
      - name: Install example-app deps
        working-directory: example-app
        run: npm ci
      - name: Sync web assets and plugin into iOS project
        working-directory: example-app
        run: npx cap sync ios
      - name: E2E driving events
        run: .github/scripts/e2e-ios-driving-events.sh
      - name: E2E geofencing
        run: .github/scripts/e2e-ios-geofencing.sh
      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-e2e-xcresult
          path: |
            /tmp/e2e-ios-results.xcresult
            /tmp/e2e-ios-geofencing.xcresult
