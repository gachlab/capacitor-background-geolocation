name: Release

# Publishes to npm when a GitHub Release is published.
# Auth is via npm Trusted Publishing (OIDC) — NO long-lived NPM_TOKEN.
# The trusted publisher must be configured once on npmjs.com for this
# package, pointing at repo gachlab/capacitor-background-geolocation and
# workflow file `release.yml`.
on:
  release:
    types: [published]

jobs:
  publish:
    name: Build and publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      # node 20 ships npm 10.x; Trusted Publishing (OIDC) needs npm >= 11.5.1.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      # No NODE_AUTH_TOKEN: npm detects the GitHub OIDC environment and
      # authenticates via the configured trusted publisher. Provenance is
      # attached automatically.
      - run: npm publish --access public
